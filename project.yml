name: iMackPeek
options:
  bundleIdPrefix: com.smartfull
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: pt-BR

targets:
  iMackPeek:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Core
      - path: UI
      - path: Utilities
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartfull.imackpeek
        PRODUCT_NAME: iMackPeek
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        # Dev: assinatura ad-hoc, sem hardened runtime e sem sandbox.
        # iMackPeek precisa executar o binário `mackup` via Process, o que é
        # incompatível com o App Sandbox. Distribuição final usa Developer ID.
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
